name: Budget Report

on:
  schedule:
    - cron: '0 9 * * 0,2,4'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Send budget report to Telegram
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        with:
          script: |
            const https = require('https');

            function post(hostname, path, body) {
              return new Promise((resolve, reject) => {
                const data = JSON.stringify(body);
                const req = https.request({
                  hostname, path, method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) }
                }, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => resolve(JSON.parse(d)));
                });
                req.on('error', reject);
                req.write(data);
                req.end();
              });
            }

            function get(hostname, path, headers) {
              return new Promise((resolve, reject) => {
                https.get({ hostname, path, headers }, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => resolve(JSON.parse(d)));
                }).on('error', reject);
              });
            }

            const SUPABASE_URL = process.env.SUPABASE_URL;
            const SUPABASE_KEY = process.env.SUPABASE_ANON_KEY;
            const TG_TOKEN = process.env.TG_BOT_TOKEN;
            const TG_CHAT = '-5182091532';

            const host = SUPABASE_URL.replace('https://', '');
            const rows = await get(host, '/rest/v1/budget_data?id=eq.main&select=data', {
              apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY
            });

            const data = rows[0] && rows[0].data;
            if (!data) { console.log('No data'); return; }

            const now = new Date();
            const days = ['אחד','שני','שלישי','רביעי','חמישי','שישי','שבת'];
            const dateStr = now.toLocaleDateString('he-IL');

            const expenses = data.expenses || [];
            const incomes = data.incomes || [];
            const varBuckets = data.variableBuckets || [];
            const fixBuckets = data.fixedBuckets || [];

            const totalIncome = incomes.reduce((s, i) => s + Number(i.amount || 0), 0);
            const fixBudget = fixBuckets.reduce((s, b) => s + Number(b.amount || 0), 0);
            const varBudget = varBuckets.reduce((s, b) => s + Number(b.amount || 0), 0);

            const cycleDay = data.cycleStartDay || 10;
            const d = now.getDate();
            const m = d >= cycleDay ? now.getMonth() : now.getMonth() - 1;
            const y = m < 0 ? now.getFullYear() - 1 : now.getFullYear();
            const cycleStart = new Date(y, (m + 12) % 12, cycleDay);
            const cycleEnd = new Date(y, (m + 12) % 12 + 1, cycleDay - 1);

            const cycleExp = expenses.filter(e => {
              const ed = new Date(e.date || e.createdAt);
              return ed >= cycleStart && ed <= cycleEnd;
            });

            const totalSpent = cycleExp.reduce((s, e) => s + Number(e.amount || 0), 0);
            const varSpent = cycleExp.filter(e => varBuckets.find(b => b.id === e.bucketId))
              .reduce((s, e) => s + Number(e.amount || 0), 0);
            const varLeft = varBudget - varSpent;
            const pct = Math.round((totalSpent / (fixBudget + varBudget)) * 100);

            const lines = [
              '📊 דוח תקציב | ' + days[now.getDay()] + ' ' + dateStr,
              '',
              '💰 הכנסה: ₪' + totalIncome.toLocaleString('he-IL'),
              '💸 הוצאות: ₪' + totalSpent.toLocaleString('he-IL') + ' (' + pct + '%)',
              '💳 קבועות: ₪' + fixBudget.toLocaleString('he-IL'),
              '🎯 משתנות נוצל: ₪' + varSpent.toLocaleString('he-IL') + ' / ₪' + varBudget.toLocaleString('he-IL'),
              '✅ נותר למשתנות: ₪' + varLeft.toLocaleString('he-IL'),
              '📅 ' + cycleStart.toLocaleDateString('he-IL') + ' - ' + cycleEnd.toLocaleDateString('he-IL')
            ];

            const result = await post('api.telegram.org', '/bot' + TG_TOKEN + '/sendMessage', {
              chat_id: TG_CHAT, text: lines.join('\n')
            });
            console.log('Sent:', result.ok, result.result && result.result.message_id);
